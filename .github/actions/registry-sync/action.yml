# =============================================================================
# Composite Action: Registry Sync
# Path: .github/actions/registry-sync/action.yml
# =============================================================================
# Reusable action for syncing images from GHCR (primary) to Docker Hub (secondary).
# Uses skopeo for manifest-preserving multi-arch copies.
#
# Features:
#   - Inspect caching (each ref inspected at most once)
#   - Rate-limit tolerance (429 detection with progressive backoff)
#   - Raw manifest digest comparison (sha256sum of manifest JSON)
#
# Sync logic (GHCR primary):
#   * Tag in GHCR only  -> copy GHCR -> DH
#   * Tag in both       -> if digest mismatch, copy GHCR -> DH
#   * Tag in DH only    -> warning (primary missing)
#   * Tag in neither    -> skip (not yet built)
#
# Prerequisites:
#   * skopeo must be installed on the runner
#   * Both registries must already be logged in (use registry-login action first)
# =============================================================================

name: 'Registry Sync'
description: 'One-way sync of Docker images from GHCR (primary) to Docker Hub (secondary) using skopeo'

inputs:
  dockerhub_repo:
    description: 'Docker Hub repository (e.g., username/image -- no tag)'
    required: true
  ghcr_repo:
    description: 'GHCR repository (e.g., ghcr.io/owner/image -- no tag)'
    required: true
  tags:
    description: 'Comma-separated list of tags to sync (e.g., latest,stable,1.8.0)'
    required: true
  retry_count:
    description: 'Number of skopeo copy retries on transient failures (default: 3)'
    required: false
    default: '3'

outputs:
  synced_tags:
    description: 'Space-separated list of tags that were actually synced'
    value: ${{ steps.sync.outputs.synced_tags }}
  skipped_tags:
    description: 'Space-separated list of tags skipped (already in both registries)'
    value: ${{ steps.sync.outputs.skipped_tags }}
  failed_tags:
    description: 'Space-separated list of tags that failed to sync'
    value: ${{ steps.sync.outputs.failed_tags }}

runs:
  using: 'composite'
  steps:
    - name: Sync images between registries
      id: sync
      shell: bash
      env:
        DOCKERHUB_REPO: ${{ inputs.dockerhub_repo }}
        GHCR_REPO:      ${{ inputs.ghcr_repo }}
        TAGS:           ${{ inputs.tags }}
        RETRY_COUNT:    ${{ inputs.retry_count }}
      run: |
        SYNCED_TAGS=""
        SKIPPED_TAGS=""
        FAILED_TAGS=""

        # -- Inspect cache (avoid redundant skopeo inspect calls) --------
        declare -A _INSPECT_CACHE=()

        cached_skopeo_inspect() {
          local ref="$1"
          if [[ -n "${_INSPECT_CACHE[$ref]+x}" ]]; then
            echo "${_INSPECT_CACHE[$ref]}"
            return 0
          fi
          local result
          if result=$(skopeo inspect "docker://${ref}" 2>/dev/null); then
            _INSPECT_CACHE[$ref]="$result"
            echo "$result"
            return 0
          fi
          return 1
        }

        cached_skopeo_inspect_raw() {
          local ref="raw:$1"
          if [[ -n "${_INSPECT_CACHE[$ref]+x}" ]]; then
            echo "${_INSPECT_CACHE[$ref]}"
            return 0
          fi
          local result
          if result=$(skopeo inspect --raw "docker://$1" 2>/dev/null); then
            _INSPECT_CACHE[$ref]="$result"
            echo "$result"
            return 0
          fi
          return 1
        }

        # -- skopeo_copy_with_retry description src dst ------------------
        # Copies a multi-arch image (--all) with progressive-backoff retries.
        # Detects Docker Hub rate limits (429/toomanyrequests) and backs off.
        skopeo_copy_with_retry() {
          local description="$1"
          local src="$2"
          local dst="$3"
          local max=${RETRY_COUNT:-3}
          local attempt=1
          local err_file
          err_file="$(mktemp)"

          while [[ $attempt -le $max ]]; do
            echo "  [attempt $attempt/$max] $description"
            if skopeo copy --all "docker://${src}" "docker://${dst}" 2>"$err_file"; then
              echo "  Success"
              rm -f "$err_file"
              return 0
            fi

            # Detect rate limiting -- use longer backoff
            if grep -qiE '429|toomanyrequests|rate limit' "$err_file"; then
              local wait=$(( attempt * 60 ))
              echo "  ::warning::Rate limited -- backing off ${wait}s..."
            else
              local wait=$(( attempt * 15 ))
              echo "  Failed -- retrying in ${wait}s..."
              cat "$err_file" >&2
            fi
            sleep "$wait"
            (( attempt++ ))
          done

          echo "  All $max attempts failed: $description"
          rm -f "$err_file"
          return 1
        }

        # Invalidate cache for a specific ref (after writes)
        invalidate_cache() {
          local ref="$1"
          unset '_INSPECT_CACHE[$ref]'
          unset '_INSPECT_CACHE[raw:$ref]'
        }

        # -- sync_tag tag ------------------------------------------------
        sync_tag() {
          local tag="$1"
          local dh_ref="${DOCKERHUB_REPO}:${tag}"
          local gc_ref="${GHCR_REPO}:${tag}"

          echo "-- Tag: $tag --"

          local DH_EXISTS GC_EXISTS
          DH_EXISTS=$(cached_skopeo_inspect "${dh_ref}" &>/dev/null && echo yes || echo no)
          GC_EXISTS=$(cached_skopeo_inspect "${gc_ref}" &>/dev/null && echo yes || echo no)
          echo "  Docker Hub: $DH_EXISTS | GHCR: $GC_EXISTS"

          if [[ "$DH_EXISTS" == no && "$GC_EXISTS" == yes ]]; then
            echo "  -> Syncing GHCR -> Docker Hub"
            if skopeo_copy_with_retry "$tag: GHCR->DH" "$gc_ref" "$dh_ref"; then
              invalidate_cache "$dh_ref"
              SYNCED_TAGS="$SYNCED_TAGS $tag(GHCR->DH)"
            else
              FAILED_TAGS="$FAILED_TAGS $tag"
            fi

          elif [[ "$DH_EXISTS" == yes && "$GC_EXISTS" == yes ]]; then
            # Both present -- check if digests match via raw manifest hash
            DH_DIG=$(cached_skopeo_inspect_raw "${dh_ref}" | sha256sum | cut -d' ' -f1 || echo "")
            GC_DIG=$(cached_skopeo_inspect_raw "${gc_ref}" | sha256sum | cut -d' ' -f1 || echo "")

            if [[ -n "$DH_DIG" && -n "$GC_DIG" && "$DH_DIG" != "$GC_DIG" ]]; then
              echo "  -> Digest mismatch -- re-syncing GHCR -> Docker Hub"
              if skopeo_copy_with_retry "$tag: GHCR->DH (re-sync)" "$gc_ref" "$dh_ref"; then
                invalidate_cache "$dh_ref"
                SYNCED_TAGS="$SYNCED_TAGS $tag(re-sync GHCR->DH)"
              else
                FAILED_TAGS="$FAILED_TAGS $tag"
              fi
            else
              echo "  Already in sync -- skipping"
              SKIPPED_TAGS="$SKIPPED_TAGS $tag"
            fi

          elif [[ "$DH_EXISTS" == yes && "$GC_EXISTS" == no ]]; then
            echo "  ::warning::GHCR missing while Docker Hub has tag -- skipping (primary missing)"
            FAILED_TAGS="$FAILED_TAGS $tag(ghcr-missing)"

          else
            echo "  Not found in either registry -- skipping"
            SKIPPED_TAGS="$SKIPPED_TAGS $tag(not-found)"
          fi
        }

        # -- Process tags sequentially -----------------------------------
        IFS=',' read -ra TAG_ARRAY <<< "$TAGS"
        for tag in "${TAG_ARRAY[@]}"; do
          tag=$(echo "$tag" | xargs)   # trim whitespace
          [[ -z "$tag" ]] && continue
          sync_tag "$tag"
        done

        # -- Outputs -----------------------------------------------------
        echo "synced_tags=${SYNCED_TAGS# }"  >> "$GITHUB_OUTPUT"
        echo "skipped_tags=${SKIPPED_TAGS# }" >> "$GITHUB_OUTPUT"
        echo "failed_tags=${FAILED_TAGS# }"   >> "$GITHUB_OUTPUT"

        echo ""
        echo "=== Sync Summary ==="
        echo "Synced:  ${SYNCED_TAGS:-none}"
        echo "Skipped: ${SKIPPED_TAGS:-none}"
        echo "Failed:  ${FAILED_TAGS:-none}"

        # Fail the step if any tag failed
        [[ -n "${FAILED_TAGS// }" ]] && exit 1 || exit 0

    - name: Write sync summary
      if: always()
      shell: bash
      run: |
        write_rows() {
          local status="$1"
          local values="$2"
          local t

          for t in $values; do
            [[ -z "$t" ]] && continue
            echo "| $t | $status |" >> "$GITHUB_STEP_SUMMARY"
          done
        }

        echo "## Registry Sync: ${{ inputs.dockerhub_repo }}" >> "$GITHUB_STEP_SUMMARY"
        echo "| Tag(s) | Status |"                              >> "$GITHUB_STEP_SUMMARY"
        echo "|---|---|"                                         >> "$GITHUB_STEP_SUMMARY"

        write_rows "Synced"  "${{ steps.sync.outputs.synced_tags }}"
        write_rows "Skipped" "${{ steps.sync.outputs.skipped_tags }}"
        write_rows "Failed"  "${{ steps.sync.outputs.failed_tags }}"
