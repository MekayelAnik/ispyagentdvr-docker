# =============================================================================
# Composite Action: Registry Sync
# =============================================================================
# Reusable action for syncing images from GHCR (primary) to Docker Hub (secondary)
# =============================================================================

name: 'Registry Sync'
description: 'Synchronize Docker images from GHCR to Docker Hub'

inputs:
  dockerhub_repo:
    description: 'Docker Hub repository (e.g., username/image)'
    required: true
  ghcr_repo:
    description: 'GHCR repository (e.g., ghcr.io/owner/image)'
    required: true
  tags:
    description: 'Comma-separated list of tags to sync'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Sync images from GHCR to Docker Hub
      shell: bash
      env:
        DOCKERHUB_REPO: ${{ inputs.dockerhub_repo }}
        GHCR_REPO: ${{ inputs.ghcr_repo }}
        TAGS: ${{ inputs.tags }}
      run: |
        get_child_digest_set() {
          local ref=$1
          local raw digests

          if ! command -v jq >/dev/null 2>&1; then
            echo ""
            return 0
          fi

          raw=$(skopeo inspect --raw "docker://${ref}" 2>/dev/null || true)
          if [ -z "$raw" ]; then
            echo ""
            return 0
          fi

          # Multi-arch index: compare child manifest digests instead of top-level digest,
          # which can differ across registries due to reserialization.
          digests=$(echo "$raw" | jq -r 'if .manifests then .manifests[].digest else empty end' 2>/dev/null | sort -u | tr '\n' ',' | sed 's/,$//')
          if [ -n "$digests" ]; then
            echo "$digests"
            return 0
          fi

          # Single-image manifest fallback.
          echo "$raw" | jq -r 'if .config.digest then .config.digest else empty end' 2>/dev/null
        }

        get_version_label() {
          local ref=$1
          local version
          version=$(skopeo inspect --format '{{ index .Labels "org.opencontainers.image.version" }}' "docker://${ref}" 2>/dev/null || true)
          version=$(echo "$version" | sed 's/<no value>//g' | xargs)
          echo "$version"
        }

        sync_tag() {
          local tag=$1
          local dh_ref="${DOCKERHUB_REPO}:${tag}"
          local ghcr_ref="${GHCR_REPO}:${tag}"

          DH_EXISTS=$(skopeo inspect "docker://${dh_ref}" > /dev/null 2>&1 && echo "yes" || echo "no")
          GHCR_EXISTS=$(skopeo inspect "docker://${ghcr_ref}" > /dev/null 2>&1 && echo "yes" || echo "no")

          if [ "$GHCR_EXISTS" == "no" ] && [ "$DH_EXISTS" == "yes" ]; then
            echo "Syncing $tag: Docker Hub -> GHCR (backfill mode)"
            skopeo copy --all "docker://${dh_ref}" "docker://${ghcr_ref}"
          elif [ "$GHCR_EXISTS" == "no" ] && [ "$DH_EXISTS" == "no" ]; then
            echo "Tag $tag: not found in either registry - skipping"
            return 0
          elif [ "$GHCR_EXISTS" == "yes" ] && [ "$DH_EXISTS" == "no" ]; then
            echo "Syncing $tag: GHCR -> Docker Hub"
            skopeo copy --all "docker://${ghcr_ref}" "docker://${dh_ref}"
          else
            GHCR_CHILD_SET=$(get_child_digest_set "$ghcr_ref")
            DH_CHILD_SET=$(get_child_digest_set "$dh_ref")

            if [ -n "$GHCR_CHILD_SET" ] && [ -n "$DH_CHILD_SET" ] && [ "$GHCR_CHILD_SET" == "$DH_CHILD_SET" ]; then
              echo "Tag $tag: child manifests already match across registries - skipping"
              return 0
            fi

            GHCR_VERSION=$(get_version_label "$ghcr_ref")
            DH_VERSION=$(get_version_label "$dh_ref")

            if [ -n "$GHCR_VERSION" ] && [ -n "$DH_VERSION" ] && [ "$GHCR_VERSION" == "$DH_VERSION" ]; then
              echo "Tag $tag: already points to version $GHCR_VERSION in both registries - skipping"
              return 0
            fi

            GHCR_DIGEST=$(skopeo inspect --format '{{.Digest}}' "docker://${ghcr_ref}" 2>/dev/null || echo "")
            DH_DIGEST=$(skopeo inspect --format '{{.Digest}}' "docker://${dh_ref}" 2>/dev/null || echo "")

            if [ "$GHCR_DIGEST" != "$DH_DIGEST" ]; then
              echo "Syncing $tag: digest mismatch, GHCR -> Docker Hub"
              skopeo copy --all "docker://${ghcr_ref}" "docker://${dh_ref}"
            else
              echo "Tag $tag: Docker Hub already matches GHCR"
            fi
          fi

          # Verify Docker Hub now mirrors GHCR for this tag.
          GHCR_DIGEST_FINAL=$(skopeo inspect --format '{{.Digest}}' "docker://${ghcr_ref}" 2>/dev/null || echo "")
          DH_DIGEST_FINAL=$(skopeo inspect --format '{{.Digest}}' "docker://${dh_ref}" 2>/dev/null || echo "")
          GHCR_CHILD_SET_FINAL=$(get_child_digest_set "$ghcr_ref")
          DH_CHILD_SET_FINAL=$(get_child_digest_set "$dh_ref")
          GHCR_VERSION_FINAL=$(get_version_label "$ghcr_ref")
          DH_VERSION_FINAL=$(get_version_label "$dh_ref")

          if [ -n "$GHCR_CHILD_SET_FINAL" ] && [ -n "$DH_CHILD_SET_FINAL" ]; then
            if [ "$GHCR_CHILD_SET_FINAL" != "$DH_CHILD_SET_FINAL" ]; then
              echo "::error::Sync verification failed for $tag (child manifest digests differ between GHCR and Docker Hub)"
              return 1
            fi

            echo "Verified $tag: Docker Hub matches GHCR child manifest set"
            return 0
          fi

          if [ -n "$GHCR_VERSION_FINAL" ] && [ -n "$DH_VERSION_FINAL" ]; then
            if [ "$GHCR_VERSION_FINAL" != "$DH_VERSION_FINAL" ]; then
              echo "::error::Sync verification failed for $tag (GHCR version $GHCR_VERSION_FINAL != Docker Hub version $DH_VERSION_FINAL)"
              return 1
            fi

            echo "Verified $tag: Docker Hub matches GHCR version ($GHCR_VERSION_FINAL)"
            return 0
          fi

          if [ -z "$GHCR_DIGEST_FINAL" ] || [ -z "$DH_DIGEST_FINAL" ]; then
            echo "::error::Sync verification failed for $tag (missing digest from one registry)"
            return 1
          fi

          if [ "$GHCR_DIGEST_FINAL" != "$DH_DIGEST_FINAL" ]; then
            # Cross-registry manifest list digests can differ after copy due to registry-specific
            # reserialization while still referencing identical platform images.
            echo "::warning::Digest mismatch for $tag after sync (GHCR $GHCR_DIGEST_FINAL != Docker Hub $DH_DIGEST_FINAL). Treating as synced because destination tag exists and copy completed successfully."
            return 0
          fi

          echo "Verified $tag: Docker Hub matches GHCR ($GHCR_DIGEST_FINAL)"
          return 0
        }

        IFS=',' read -ra TAG_ARRAY <<< "$TAGS"
        declare -A SEEN_TAGS
        for tag in "${TAG_ARRAY[@]}"; do
          CLEAN_TAG="$(echo "$tag" | xargs)"
          if [ -z "$CLEAN_TAG" ]; then
            continue
          fi

          if [ -n "${SEEN_TAGS[$CLEAN_TAG]}" ]; then
            echo "Tag $CLEAN_TAG: duplicate in input list - skipping duplicate"
            continue
          fi
          SEEN_TAGS[$CLEAN_TAG]=1

          sync_tag "$CLEAN_TAG" || exit 1
        done
